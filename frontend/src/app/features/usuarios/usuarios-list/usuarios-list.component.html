<section class="space-y-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-blue-400">Administracion</p>
      <h3 class="text-2xl font-bold text-white">Usuarios</h3>
    </div>
    <a class="btn-primary" routerLink="/usuarios/nuevo">Nuevo usuario</a>
  </div>

  <div class="card-surface overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-slate-500">
        <tr>
          <th class="px-4 py-3">Nombre</th>
          <th class="px-4 py-3">Correo</th>
          <th class="px-4 py-3">Rol</th>
          <th class="px-4 py-3">Estado</th>
          <th class="px-4 py-3">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <tr *ngFor="let user of users">
          <td class="px-4 py-3 font-medium">{{ user.nombre }} {{ user.apellido }}</td>
          <td class="px-4 py-3">{{ user.email }}</td>
          <td class="px-4 py-3">{{ user.rol_nombre || user.rol_id }}</td>
          <td class="px-4 py-3">{{ user.estado_nombre || user.estado_id }}</td>
          <td class="px-4 py-3">
            <button class="btn-secondary mr-2" (click)="edit(user.id)">Editar</button>
            <button class="btn-secondary" (click)="remove(user.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
