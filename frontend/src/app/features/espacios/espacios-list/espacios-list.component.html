<section class="space-y-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-blue-400">Infraestructura</p>
      <h3 class="text-2xl font-bold text-white">Espacios</h3>
    </div>
    <a class="btn-primary" routerLink="/espacios/nuevo">Nuevo espacio</a>
  </div>
  <div class="card-surface overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-slate-500">
        <tr>
          <th class="px-4 py-3">Codigo</th>
          <th class="px-4 py-3">Nombre</th>
          <th class="px-4 py-3">Tipo</th>
          <th class="px-4 py-3">Capacidad</th>
          <th class="px-4 py-3">Estado</th>
          <th class="px-4 py-3">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <tr *ngFor="let item of items">
          <td class="px-4 py-3">{{ item.codigo }}</td>
          <td class="px-4 py-3 font-medium">{{ item.nombre }}</td>
          <td class="px-4 py-3">{{ item.tipo }}</td>
          <td class="px-4 py-3">{{ item.capacidad || 0 }}</td>
          <td class="px-4 py-3">{{ item.estado_nombre || item.estado_id }}</td>
          <td class="px-4 py-3">
            <button class="btn-secondary mr-2" (click)="edit(item.id)">Editar</button>
            <button class="btn-secondary" (click)="remove(item.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
