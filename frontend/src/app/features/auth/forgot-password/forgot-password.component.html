<div class="auth-panel">
  <div class="auth-panel__eyebrow">Recuperacion segura</div>
  <h2 class="auth-panel__title">Olvide mi contrasena</h2>
  <p class="auth-panel__subtitle">
    Ingresa tu correo y, si pertenece a una cuenta registrada, te enviaremos un enlace para restablecer tu contrasena.
  </p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <label class="field">
      <span class="field__label">Correo electronico *</span>
      <input
        type="email"
        formControlName="email"
        placeholder="usuario@demo.local"
        [class.field__input--error]="hasError()"
        class="field__input"
      />
      <small class="field__error" *ngIf="hasError()">Ingresa un correo valido.</small>
    </label>

    <div class="alert alert--success" *ngIf="successMessage">{{ successMessage }}</div>
    <div class="alert alert--error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <button type="submit" class="auth-button" [disabled]="loading">
      {{ loading ? 'Enviando...' : 'Enviar enlace de recuperacion' }}
    </button>

    <a routerLink="/auth/login" class="auth-link">Volver al inicio de sesion</a>
  </form>
</div>
