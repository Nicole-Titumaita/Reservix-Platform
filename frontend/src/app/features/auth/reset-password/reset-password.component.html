<div class="auth-panel">
  <div class="auth-panel__eyebrow">Recuperacion segura</div>
  <h2 class="auth-panel__title">Restablecer contrasena</h2>
  <p class="auth-panel__subtitle">Crea una nueva contrasena para volver a ingresar al sistema.</p>

  <div class="alert alert--error" *ngIf="tokenError">{{ tokenError }}</div>
  <div class="alert alert--success" *ngIf="successMessage">{{ successMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" *ngIf="!tokenError">
    <label class="field">
      <span class="field__label">Nueva contrasena *</span>
      <input
        type="password"
        formControlName="password"
        placeholder="Ingresa una nueva contrasena"
        class="field__input"
      />
      <small class="field__error" *ngIf="form.get('password')?.invalid && (form.get('password')?.dirty || form.get('password')?.touched || submitted)">
        La contrasena debe tener 8 caracteres, mayuscula, minuscula, numero y caracter especial.
      </small>
    </label>

    <div class="strength">
      <div class="strength__title">Requisitos de seguridad</div>
      <div class="strength__list">
        <span [class.strength__item--ok]="strengthOk('length')" class="strength__item">8 caracteres</span>
        <span [class.strength__item--ok]="strengthOk('upper')" class="strength__item">Mayuscula</span>
        <span [class.strength__item--ok]="strengthOk('lower')" class="strength__item">Minuscula</span>
        <span [class.strength__item--ok]="strengthOk('number')" class="strength__item">Numero</span>
        <span [class.strength__item--ok]="strengthOk('special')" class="strength__item">Especial</span>
      </div>
    </div>

    <label class="field">
      <span class="field__label">Confirmar contrasena *</span>
      <input
        type="password"
        formControlName="confirm_password"
        placeholder="Repite la nueva contrasena"
        class="field__input"
      />
      <small class="field__error" *ngIf="mismatchError()">Las contrasenas no coinciden.</small>
    </label>

    <div class="alert alert--error" *ngIf="errorMessage">{{ errorMessage }}</div>

    <button type="submit" class="auth-button" [disabled]="loading || !tokenValid">
      {{ loading ? 'Guardando...' : 'Actualizar contrasena' }}
    </button>

    <a routerLink="/auth/login" class="auth-link">Volver al inicio de sesion</a>
  </form>
</div>
