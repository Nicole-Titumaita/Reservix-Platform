<section class="space-y-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-blue-400">Agenda</p>
      <h3 class="text-2xl font-bold text-white">Horarios</h3>
    </div>
    <a class="btn-primary" routerLink="/horarios/nuevo">Nuevo horario</a>
  </div>
  <div class="card-surface overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-slate-500">
        <tr>
          <th class="px-4 py-3">Nombre</th>
          <th class="px-4 py-3">Dia</th>
          <th class="px-4 py-3">Inicio</th>
          <th class="px-4 py-3">Fin</th>
          <th class="px-4 py-3">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <tr *ngFor="let item of items">
          <td class="px-4 py-3 font-medium">{{ item.nombre }}</td>
          <td class="px-4 py-3">{{ item.dia_semana }}</td>
          <td class="px-4 py-3">{{ item.hora_inicio }}</td>
          <td class="px-4 py-3">{{ item.hora_fin }}</td>
          <td class="px-4 py-3">
            <button class="btn-secondary mr-2" (click)="edit(item.id)">Editar</button>
            <button class="btn-secondary" (click)="remove(item.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
