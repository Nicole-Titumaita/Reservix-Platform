<section class="space-y-5">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-blue-400">Administracion</p>
      <h3 class="text-2xl font-bold text-white">Roles</h3>
    </div>
    <a class="btn-primary" routerLink="/roles/nuevo">Nuevo rol</a>
  </div>

  <div class="card-surface overflow-hidden">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-slate-500">
        <tr>
          <th class="px-4 py-3">ID</th>
          <th class="px-4 py-3">Nombre</th>
          <th class="px-4 py-3">Descripcion</th>
          <th class="px-4 py-3">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <tr *ngFor="let rol of roles">
          <td class="px-4 py-3">{{ rol.id }}</td>
          <td class="px-4 py-3 font-medium">{{ rol.nombre }}</td>
          <td class="px-4 py-3 text-slate-600">{{ rol.descripcion || '-' }}</td>
          <td class="px-4 py-3">
            <button class="btn-secondary mr-2" (click)="edit(rol.id)">Editar</button>
            <button class="btn-secondary" (click)="remove(rol.id)">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
